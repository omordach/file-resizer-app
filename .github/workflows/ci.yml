name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-secure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python deps cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit (SAST)
        run: bandit -q -r backend/app -x backend/tests

      - name: Build Docker Image
        run: docker build -t file-resizer-app -f backend/Dockerfile .

      - name: Run Backend Tests Inside Container
        run: docker run --rm -e PYTHONPATH=/app -e DISABLE_CAPTCHA=true file-resizer-app pytest -q tests

      - name: Generate SBOM (Syft CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: "file-resizer-app:latest"
          format: "cyclonedx-json"
          output-file: "sbom.cdx.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: file-resizer-app:latest
          format: table
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'
